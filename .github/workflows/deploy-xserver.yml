name: Deploy to Xserver

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: xserver-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to Xserver
        env:
          XSERVER_DEPLOY_TOKEN: ${{ secrets.XSERVER_DEPLOY_TOKEN }}
        run: |
          cd dist
          zip -qr ../site.zip .
          cd ..
          curl --fail --silent --show-error --retry 3 \
            -H "X-GAMI-DEPLOY-TOKEN: ${XSERVER_DEPLOY_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @site.zip \
            https://ai.gami.jp/api/deploy.php
