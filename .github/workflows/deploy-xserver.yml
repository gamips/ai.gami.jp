name: Deploy to Xserver

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: xserver-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lftp

      - name: Deploy dist to Xserver
        shell: bash
        env:
          XSERVER_FTP_SERVER: ${{ secrets.XSERVER_FTP_SERVER }}
          XSERVER_FTP_USERNAME: ${{ secrets.XSERVER_FTP_USERNAME }}
          XSERVER_FTP_PASSWORD: ${{ secrets.XSERVER_FTP_PASSWORD }}
          XSERVER_FTP_PORT: ${{ secrets.XSERVER_FTP_PORT }}
          XSERVER_FTP_REMOTE_PATH: ${{ secrets.XSERVER_FTP_REMOTE_PATH }}
        run: |
          set -euo pipefail
          lftp -u "$XSERVER_FTP_USERNAME","$XSERVER_FTP_PASSWORD" -p "$XSERVER_FTP_PORT" "$XSERVER_FTP_SERVER" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:max-retries 3
          set net:timeout 30
          mirror --reverse --verbose=1 ./dist/ "$XSERVER_FTP_REMOTE_PATH"
          mirror --reverse --delete --verbose=1 ./dist/assets/ "$XSERVER_FTP_REMOTE_PATH/assets/"
          bye
          EOF
