# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: gamips/ai.gami.jp
  branch: master
  base_url: https://ai-gami-sveltia-cms-auth.gamips.workers.dev

media_folder: public/uploads
public_folder: /uploads
site_url: https://ai.gami.jp
display_url: https://ai.gami.jp
locale: ja

collections:
  - name: news
    label: お知らせ
    label_singular: お知らせ
    folder: src/app/content/news-items
    create: true
    delete: true
    format: json
    extension: json
    identifier_field: title
    slug: "{{id}}"
    preview_path: "/news/{{id}}/"
    summary: "{{title}} - {{date}}"
    sortable_fields:
      - date
      - title
      - category
    fields:
      - label: 公開する
        name: published
        widget: boolean
        default: true
      - label: ID
        name: id
        widget: string
        hint: "半角英数字とハイフンで入力します。公開後は変更しないでください。例: summer-campaign"
      - label: 公開日
        name: date
        widget: datetime
        type: date
        default: "{{now}}"
      - label: カテゴリ
        name: category
        widget: select
        options:
          - お知らせ
          - サービス
          - 実績
          - メディア
      - label: タイトル
        name: title
        widget: string
      - label: 一覧説明・SEO説明文
        name: description
        widget: text
        hint: "一覧と検索結果向けの短い説明文です。80〜120文字程度を目安にします。"
      - label: 本文
        name: body
        widget: text
        hint: "詳細ページに表示されます。段落を分ける場合は空行を入れてください。"
        required: false
      - label: 外部リンクURL
        name: href
        widget: string
        required: false
      - label: 外部リンク文言
        name: hrefLabel
        widget: string
        default: 関連リンク
        required: false
