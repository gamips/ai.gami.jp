<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>GAMI CMS Reset</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f4f5;
        color: #18181b;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(100%, 560px);
        border: 1px solid #e4e4e7;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 24px;
        line-height: 1.4;
      }

      p {
        margin: 0 0 24px;
        color: #52525b;
        line-height: 1.8;
      }

      a {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #06b6d4;
        color: #ffffff;
        font-weight: 700;
        padding: 12px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>CMSのログイン状態をリセットしました</h1>
        <p>古いGitHub認証情報を削除しました。次の画面で、gamipsアカウントとしてGitHubにログインし直してください。</p>
        <a href="/admin/">管理画面へ戻る</a>
      </section>
    </main>
    <script>
      (async () => {
        localStorage.clear();
        sessionStorage.clear();

        if ("caches" in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map((name) => caches.delete(name)));
        }

        if ("indexedDB" in window && indexedDB.databases) {
          const databases = await indexedDB.databases();
          await Promise.all(
            databases
              .map((database) => database.name)
              .filter(Boolean)
              .map((name) => indexedDB.deleteDatabase(name)),
          );
        }

        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      })();
    </script>
  </body>
</html>
